{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Coinductor</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <header class="border-b border-slate-200 bg-white">
      <nav class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3">
        <a href="/" class="text-lg font-semibold">Coinductor</a>
        <div class="flex items-center gap-4 text-sm font-medium">
          {% if user.is_authenticated %}
            <span>Welcome, {{ user.username }}</span>
            <a href="#" class="text-blue-600 hover:text-blue-700">Logout</a>
          {% else %}
            <a href="#" class="text-blue-600 hover:text-blue-700">Login</a>
            <a href="#" class="text-blue-600 hover:text-blue-700">Sign Up</a>
          {% endif %}
        </div>
      </nav>
    </header>
    <main class="mx-auto max-w-5xl px-4 py-8">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
