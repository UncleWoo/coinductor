{% extends "base.html" %}

{% block content %}
  <section class="mx-auto max-w-md rounded-xl bg-white p-6 text-center shadow">
    <h1 class="text-2xl font-bold text-slate-900">Logout</h1>
    {% if user.is_authenticated %}
      <p class="mt-3 text-sm text-slate-600">Are you sure you want to log out?</p>
      <form method="post" class="mt-5">
        {% csrf_token %}
        <button
          type="submit"
          class="rounded bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700"
        >
          Confirm logout
        </button>
      </form>
    {% else %}
      <p class="mt-3 text-sm text-slate-600">You have been logged out.</p>
      <p class="mt-4">
        <a href="{% url 'login' %}" class="font-medium text-blue-600 hover:text-blue-700">Log in again</a>
      </p>
    {% endif %}
  </section>
{% endblock %}
